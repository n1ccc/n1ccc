name: Update GitHub Readme Stats
on:
  schedule:
    - cron: '0 0 * * *' # Läuft einmal täglich um Mitternacht
  workflow_dispatch: # Erlaubt den manuellen Start

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: n1ccc
          template: classic
          base: header, activity, community, repositories
