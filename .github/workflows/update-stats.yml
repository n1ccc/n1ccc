name: Update GitHub Readme Stats
on:
  schedule:
    - cron: '0 0 * * *' # Läuft einmal täglich um Mitternacht
  workflow_dispatch: # Erlaubt den manuellen Start

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: n1ccc
          template: classic
          base: header, activity, community, repositories
          plugin_languages: yes
          plugin_languages_colors: github # Nutzt originale GitHub-Farben
          plugin_languages_limit: 8       # Zeigt maximal 8 Sprachen
